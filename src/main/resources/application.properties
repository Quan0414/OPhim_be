quarkus.http.port=${PORT:${QUARKUS_HTTP_PORT:8080}}
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:*}
quarkus.http.cors.methods=GET,OPTIONS
quarkus.http.cors.headers=accept,content-type

ophim.base-url=${OPHIM_BASE_URL:https://ophim1.com}

quarkus.log.console.enable=true
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.category."com.example".level=${APP_LOG_LEVEL:INFO}

quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

mp.openapi.extensions.smallrye.info.title=OPhim Backend API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Quarkus backend proxy for OPhim APIs.
